{% extends 'layout.html' %}

{% block title %}Cerrar sesión — MareaTE{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6rem 1rem 2rem;
    }

    .auth-card {
        background: white;
        border-radius: 12px;
        padding: 2.5rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border-top: 4px solid var(--mar);
        text-align: center;
    }

    .auth-title {
        font-family: 'Playfair Display', serif;
        font-size: 1.8rem;
        color: var(--roca);
        margin-bottom: 0.5rem;
    }

    .auth-subtitle {
        color: var(--gris);
        font-size: 0.9rem;
        line-height: 1.6;
        margin-bottom: 2rem;
    }

    .btn-logout {
        width: 100%;
        padding: 0.8rem;
        background: var(--roca);
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
        margin-bottom: 0.8rem;
    }

    .btn-logout:hover {
        background: #2d2d4a;
    }

    .btn-cancel {
        display: block;
        width: 100%;
        padding: 0.8rem;
        background: transparent;
        color: var(--gris);
        border: 1.5px solid #e5e7eb;
        border-radius: 6px;
        font-size: 0.95rem;
        text-decoration: none;
        transition: all 0.2s;
    }

    .btn-cancel:hover {
        border-color: var(--mar);
        color: var(--mar);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <i class="bi bi-box-arrow-right" style="font-size: 2.5rem; color: var(--gris); margin-bottom: 1rem; display: block;"></i>
        <h1 class="auth-title">Cerrar sesión</h1>
        <p class="auth-subtitle">¿Estás seguro de que deseas cerrar sesión? Tendrás que volver a introducir tu código la próxima vez.</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-logout">
                <i class="bi bi-box-arrow-right me-2"></i>Sí, cerrar sesión
            </button>
        </form>

        <a href="/" class="btn-cancel">Cancelar</a>
    </div>
</div>
{% endblock %}
