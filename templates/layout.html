<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MareaTE{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Variables y estilos globales de MareaTE -->
    <style>
        :root {
            --mar: #0077B6;
            --espuma: #90E0EF;
            --arena: #F5F0E8;
            --roca: #1A1A2E;
            --gris: #6B7280;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--arena);
            color: var(--roca);
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--roca) !important;
            letter-spacing: -0.02em;
        }

        .navbar-brand .rojo {
            color: red;
        }

        .navbar {
            background-color: rgba(245, 240, 232, 0.90);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(0, 119, 182, 0.15);
        }

        footer {
            background-color: var(--roca);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--espuma);
            text-decoration: none;
        }

        .rojo {
            color: red !important;
        }
    </style>

    <!-- Bloque para estilos extra por página -->
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- NAV -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">Marea<span class="rojo">TE</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/#parroquias">Parroquias</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- CONTENIDO -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="text-center py-4 mt-5">
        <p>MareaTE · Código abierto · <a href="#">MIT License</a> · Salinas, Asturias</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Bloque para scripts extra por página -->
    {% block extra_js %}{% endblock %}

</body>
</html>
